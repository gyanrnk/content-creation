name: Daily Script Candidates (review ke liye)

# Roz subah naye script candidates banao -> pending me daalo -> EMAIL bhejo.
# Tum phone pe review app me approve karte ho -> approved queue me jaate hain ->
# daily-shorts.yml cron unse video banata hai.
#
# Kyun alag workflow: script banana SASTA hai (koi render/upload nahi, ~2 min).
# Ye sirf tab chalta hai jab queue kam ho — warna scripts jama hote rahenge.

on:
  schedule:
    # Har 4 ghante — reject hone ke baad jaldi replacement aa jaaye (6/din ka target).
    - cron: "30 1 * * *"      # ~7:00 AM IST
    - cron: "30 5 * * *"      # ~11:00 AM IST
    - cron: "30 9 * * *"      # ~3:00 PM IST
    - cron: "30 13 * * *"     # ~7:00 PM IST
  workflow_dispatch:
    inputs:
      target:
        description: "queue+pending ko itne tak TOP-UP karo (6/din target + buffer)"
        default: "9"
      max_new:
        description: "Ek run me max kitne naye banaye"
        default: "6"

permissions:
  contents: write

jobs:
  scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Kolkata
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-build.txt

      - name: Secrets -> .env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          {
            echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY"
            echo "GROQ_API_KEY=\"$GROQ_API_KEY\""
            echo "MAIL_USERNAME=$MAIL_USERNAME"
            echo "MAIL_PASSWORD=\"$MAIL_PASSWORD\""
          } > .env

      - name: Top-up script candidates (6/din target ke liye)
        run: |
          python - <<'PY'
          import json, subprocess, sys
          TARGET  = int("${{ github.event.inputs.target || '9' }}")
          MAX_NEW = int("${{ github.event.inputs.max_new || '6' }}")

          def n_of(p):
              try:
                  return len(json.load(open(p, encoding="utf-8")))
              except Exception:
                  return 0

          q, pend = n_of("data/script_queue.json"), n_of("data/pending_scripts.json")
          have = q + pend
          need = min(MAX_NEW, max(0, TARGET - have))
          print(f"approved={q} pending={pend} total={have} target={TARGET} -> banane hain {need}")
          if need == 0:
              print("Stock poora hai — naye nahi banaye.")
              sys.exit(0)
          # NOTE: make_scripts.py pending ko REPLACE karta hai, isliye purane pending
          # bacha ke naye ke saath jod dete hain (warna review-baaki scripts ud jaate).
          old = []
          try:
              old = json.load(open("data/pending_scripts.json", encoding="utf-8"))
          except Exception:
              pass
          rc = subprocess.run([sys.executable, "make_scripts.py", str(need)]).returncode
          if rc == 0 and old:
              new = json.load(open("data/pending_scripts.json", encoding="utf-8"))
              json.dump(old + new, open("data/pending_scripts.json", "w", encoding="utf-8"),
                        ensure_ascii=False, indent=1)
              print(f"purane {len(old)} + naye {len(new)} = {len(old)+len(new)} pending")
          sys.exit(rc)
          PY

      - name: Persist pending scripts
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add data/pending_scripts.json data/trending_cache.json || true
          git commit -m "scripts: naye candidates review ke liye [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"
