name: Daily Football Shorts

# Roz auto build (cron UTC). 11:00 UTC = 16:30 IST (evening peak ke liye upload).
# Manual bhi chala sakte ho (Actions tab -> Run workflow) with count/privacy.
on:
  schedule:
    # IST = UTC+5:30. Har ghante 1 short (6/din = 6 x 1600 = 9600 units, quota 10k ke andar).
    # SHAAM ke peak pe upload (India ka prime viewing 7-11 PM IST) — Shorts upload ke turant
    # baad push hoti hain, toh peak pe daalna = zyada initial velocity = zyada reach.
    # NOTE: GitHub cron BEST-EFFORT (10-45 min late; :00 top-of-hour congested) -> :10 past.
    # Build ~10 min lagta hai, toh upload approx: ~6:00, 7:00, 8:00, 9:00, 10:00, 11:00 PM IST.
    # Video ab TURANT public jaati he (scheduled publish hata diya — dekho auto.py).
    # Isliye peak timing ab IN CRONS se aati he: build peak se thoda pehle shuru ho,
    # ~8 min me ban ke seedha peak me live ho jaaye. Cron 10-45 min late ho sakta he,
    # isliye har slot target se ~30-40 min pehle rakha he.
    # DATA-DRIVEN SHIFT (24 Jul, user ka shak sahi nikla): channel ke apne numbers
    # bole ki subah/dopahar >> shaam. Saaf daur (scheduled-era nikaal ke) medians:
    #   10a-1p: 568 (best 2044) | 2-5p: 119 (best 1627) | 6-11p ("peak"): sirf 55.
    # Generic "India peak 7-10 PM" advice is channel pe GALAT thi — shaam me har
    # channel maal phenkta he (competition), subah me saans milti he.
    # YE AAKHRI CRON EDIT HE — har edit GitHub registration me aadha din khata he.
    - cron: "30 5 * * *"     # 11:00 AM IST -> live ~11:30 AM (sabse strong zone)
    - cron: "30 6 * * *"     # 12:00 PM IST -> live ~12:30 PM
    - cron: "30 7 * * *"     # 1:00 PM IST  -> live ~1:30 PM
    - cron: "0 9 * * *"      # 2:30 PM IST  -> live ~3:00 PM
    - cron: "30 10 * * *"    # 4:00 PM IST  -> live ~4:30 PM
    - cron: "0 12 * * *"     # 5:30 PM IST  -> live ~6:00 PM (early evening tak hi)
  workflow_dispatch:
    inputs:
      count:
        description: "Kitne shorts banaye (default 1 = ek short)"
        default: "1"
      privacy:
        description: "YouTube privacy (unlisted/private/public)"
        default: "public"
      mode:
        description: "Ek mode force karo (stats/facts/story/ranking/quiz/debate). Khali = rotation"
        default: ""

permissions:
  contents: write        # asset_history.json wapas commit karne ke liye (dedup)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45         # 1 short per run (staggered hourly)
    env:
      TZ: Asia/Kolkata          # runner clock IST -> folders/logs/rotation sab IST me
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg + fonts (Devanagari for Hindi thumbnail)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-lohit-deva fonts-dejavu-core

      - name: Install deps
        run: pip install -r requirements-build.txt   # lean (streamlit sirf UI ke liye)

      - name: Secrets -> .env + credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          COVERR_API_KEY: ${{ secrets.COVERR_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: |
          {
            echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY"
            echo "GROQ_API_KEY=\"$GROQ_API_KEY\""
            echo "PEXELS_API_KEY=$PEXELS_API_KEY"
            echo "PIXABAY_API_KEY=$PIXABAY_API_KEY"
            echo "COVERR_API_KEY=$COVERR_API_KEY"
            echo "GOOGLE_TTS_API_KEY=$GOOGLE_TTS_API_KEY"
            echo "MAIL_USERNAME=$MAIL_USERNAME"
            echo "MAIL_PASSWORD=\"$MAIL_PASSWORD\""
          } > .env
          if [ -n "$YT_TOKEN" ]; then printf '%s' "$YT_TOKEN" > token.json; fi
          if [ -n "$YT_CLIENT_SECRET" ]; then printf '%s' "$YT_CLIENT_SECRET" > client_secret.json; fi

      # CLIP ab ON he (config default True). Pehle yahan sed se OFF kar dete the,
      # isliye har cloud build pehli mili candidate photo utha leta tha aur visual
      # line se match nahi karta tha. Model 579MB ka he -> cache karo warna har run
      # me dobara download hoga.
      - name: Cache CLIP model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-b32-v1

      - name: Build + upload shorts (upload auto.py ke andar hota hai — har video ban-te hi upload + email with live link)
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPLOAD_PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
          AUTO_MODE: ${{ github.event.inputs.mode || '' }}
        run: python auto.py "${{ github.event.inputs.count || '1' }}"

      - name: Save videos as artifact (download/review)
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_number }}
          path: |
            output/auto/**/short.mp4
            output/auto/**/thumbnail.jpg
            output/auto/**/post.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Persist dedup history + build data log
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          # BUG FIX: pehle 'git pull --rebase' SABSE PEHLE chalta tha, jab build ne
          # data files already badal di hoti thi -> "cannot pull with rebase: You have
          # unstaged changes" -> '|| true' ne error nigal liya -> phir push bhi fail
          # ('|| echo' ne wo bhi nigal liya). Natija: queue se pop kabhi SAVE hi nahi
          # hua. Queue kabhi ghatti nahi thi aur wahi script dobara build ho sakti thi.
          # Ab: pehle STAGE karo, phir commit, phir --autostash ke saath pull + retry.
          git add asset_history.json data/build_log.jsonl data/script_queue.json data/pending_scripts.json || true
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "chore: update dedup history + build log [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "persisted (attempt $i)"; exit 0
            fi
            echo "persist attempt $i failed (review app ne beech me commit kiya hoga), retry..."
            sleep 5
          done
          # Chup-chaap fail mat hone do — yahi bug 2 din chhupa raha tha.
          echo "::error::QUEUE PERSIST FAILED — pop save nahi hua, script dobara build hogi"
          exit 1

      # NOTE: email ab auto.py se HAR short ke baad turant jaata hai (per-video),
      # isliye yahan batch-end email nahi. Artifact download link per-video mail me
      # RUN_URL se milta hai (run complete hone par us page pe artifacts aa jaate).
