name: Daily Football Shorts

# Roz auto build (cron UTC). 11:00 UTC = 16:30 IST (evening peak ke liye upload).
# Manual bhi chala sakte ho (Actions tab -> Run workflow) with count/privacy.
on:
  schedule:
    # IST = UTC+5:30. Har ghante 1 short (6/din = 6 x 1600 = 9600 units, quota 10k ke andar).
    # SHAAM ke peak pe upload (India ka prime viewing 7-11 PM IST) — Shorts upload ke turant
    # baad push hoti hain, toh peak pe daalna = zyada initial velocity = zyada reach.
    # NOTE: GitHub cron BEST-EFFORT (10-45 min late; :00 top-of-hour congested) -> :10 past.
    # Build ~10 min lagta hai, toh upload approx: ~6:00, 7:00, 8:00, 9:00, 10:00, 11:00 PM IST.
    - cron: "5 6 * * *"      # ~11:35 AM IST
    - cron: "5 8 * * *"      # ~1:35 PM IST
    - cron: "5 10 * * *"     # ~3:35 PM IST
    - cron: "5 12 * * *"     # ~5:35 PM IST
    - cron: "5 14 * * *"     # ~7:35 PM IST (evening peak)
    - cron: "5 16 * * *"     # ~9:35 PM IST (evening peak)
  workflow_dispatch:
    inputs:
      count:
        description: "Kitne shorts banaye (default 1 = ek short)"
        default: "1"
      privacy:
        description: "YouTube privacy (unlisted/private/public)"
        default: "public"
      mode:
        description: "Ek mode force karo (stats/facts/story/ranking/quiz/debate). Khali = rotation"
        default: ""

permissions:
  contents: write        # asset_history.json wapas commit karne ke liye (dedup)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45         # 1 short per run (staggered hourly)
    env:
      TZ: Asia/Kolkata          # runner clock IST -> folders/logs/rotation sab IST me
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg + fonts (Devanagari for Hindi thumbnail)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-lohit-deva fonts-dejavu-core

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Secrets -> .env + credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          COVERR_API_KEY: ${{ secrets.COVERR_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: |
          {
            echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY"
            echo "GROQ_API_KEY=\"$GROQ_API_KEY\""
            echo "PEXELS_API_KEY=$PEXELS_API_KEY"
            echo "PIXABAY_API_KEY=$PIXABAY_API_KEY"
            echo "COVERR_API_KEY=$COVERR_API_KEY"
            echo "GOOGLE_TTS_API_KEY=$GOOGLE_TTS_API_KEY"
            echo "MAIL_USERNAME=$MAIL_USERNAME"
            echo "MAIL_PASSWORD=\"$MAIL_PASSWORD\""
          } > .env
          if [ -n "$YT_TOKEN" ]; then printf '%s' "$YT_TOKEN" > token.json; fi
          if [ -n "$YT_CLIENT_SECRET" ]; then printf '%s' "$YT_CLIENT_SECRET" > client_secret.json; fi

      - name: Config for CI (CLIP off = fast/light)
        run: sed -i 's/^REAL_PHOTO_CLIP = True/REAL_PHOTO_CLIP = False/' config.py

      - name: Build + upload shorts (upload auto.py ke andar hota hai — har video ban-te hi upload + email with live link)
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPLOAD_PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
          AUTO_MODE: ${{ github.event.inputs.mode || '' }}
        run: python auto.py "${{ github.event.inputs.count || '1' }}"

      - name: Save videos as artifact (download/review)
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_number }}
          path: |
            output/auto/**/short.mp4
            output/auto/**/thumbnail.jpg
            output/auto/**/post.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Persist dedup history + build data log
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add asset_history.json data/build_log.jsonl data/script_queue.json data/pending_scripts.json || true
          git commit -m "chore: update dedup history + build log [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"

      # NOTE: email ab auto.py se HAR short ke baad turant jaata hai (per-video),
      # isliye yahan batch-end email nahi. Artifact download link per-video mail me
      # RUN_URL se milta hai (run complete hone par us page pe artifacts aa jaate).
